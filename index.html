<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Happy Birthday Ananya 🎂</title>
  <meta property="og:image" content="">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    /* ── Design Tokens ── */
    :root {
      --midnight:   #060310;
      --deep:       #0e0720;
      --card-bg:    rgba(255,255,255,0.035);
      --card-hover: rgba(255,255,255,0.07);
      --border:     rgba(212,165,116,0.18);
      --border-h:   rgba(212,165,116,0.55);
      --gold:       #d4a574;
      --gold-light: #f0c98a;
      --rose:       #e8728c;
      --lilac:      #b57bee;
      --text-1:     #f5efe8;
      --text-2:     #c9b89e;
      --text-3:     #8a7a6a;
      --glow-gold:  rgba(212,165,116,0.25);
      --glow-rose:  rgba(232,114,140,0.25);
      --tr:         cubic-bezier(0.34,1.56,0.64,1);
      --tr-smooth:  cubic-bezier(0.4,0,0.2,1);
    }

    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html { scroll-behavior:smooth; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--midnight);
      color: var(--text-1);
      min-height: 100vh;
      overflow-x: hidden;
      cursor: none;
    }

    /* ── Restore normal cursor on touch/mobile devices ── */
    @media (hover: none), (pointer: coarse) {
      body { cursor: auto; }
      #cursor-dot, #cursor-ring { display: none !important; }
      button, a, [role="button"] { cursor: pointer !important; }
    }

    /* ── Custom Cursor ── */
    #cursor-dot {
      position: fixed; width:8px; height:8px;
      background: var(--gold); border-radius:50%;
      pointer-events:none; z-index:9999;
      transform:translate(-50%,-50%);
      transition: transform 0.08s, background 0.2s;
      mix-blend-mode: screen;
    }
    #cursor-ring {
      position:fixed; width:36px; height:36px;
      border:1.5px solid rgba(212,165,116,0.6);
      border-radius:50%; pointer-events:none; z-index:9998;
      transform:translate(-50%,-50%);
      transition: transform 0.18s var(--tr-smooth), width 0.3s, height 0.3s, border-color 0.3s;
    }
    body:has(.wish-card:hover) #cursor-ring,
    body:has(.btn:hover) #cursor-ring { width:56px; height:56px; border-color:var(--rose); }
    body:has(.wish-card:hover) #cursor-dot { background:var(--rose); transform:translate(-50%,-50%) scale(1.5); }

    /* ── Canvases ── */
    #stars-canvas, #particles-canvas {
      position:fixed; inset:0; width:100%; height:100%;
      pointer-events:none;
    }
    #stars-canvas   { z-index:1; }
    #particles-canvas { z-index:2; }

    /* ── Main Layout ── */
    .page {
      position:relative; z-index:10;
      max-width:1160px; margin:0 auto;
      padding:80px 24px 100px;
      display:flex; flex-direction:column; align-items:center;
    }

    /* ── Date Badge ── */
    .date-badge {
      display:inline-flex; align-items:center; gap:8px;
      padding:6px 18px;
      border:1px solid var(--border);
      border-radius:100px;
      font-size:0.75rem; font-weight:600; letter-spacing:0.14em;
      color:var(--gold); text-transform:uppercase;
      background:rgba(212,165,116,0.07);
      margin-bottom:28px;
      animation: fadeDown 0.7s var(--tr) both;
    }
    .date-badge span { font-size:1em; }

    /* ── Header ── */
    .header {
      text-align:center;
      margin-bottom:88px;
    }

    .header h1 {
      font-family:'Cormorant Garamond', serif;
      font-size:clamp(3rem,9vw,6.5rem);
      font-weight:700; line-height:1;
      letter-spacing:-0.02em;
      animation:fadeDown 0.8s var(--tr) 0.2s both;
    }

    .h1-line1 {
      display:block;
      color:var(--text-2);
      font-style:italic;
      font-size:0.55em;
      letter-spacing:0.05em;
      margin-bottom:4px;
    }

    .h1-name {
      display:block;
      background:linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 40%, var(--rose) 80%, var(--lilac) 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      background-clip:text;
      filter:drop-shadow(0 0 40px rgba(212,165,116,0.35));
    }

    /* Typewriter cursor */
    .tw-cursor {
      display:inline-block;
      width:3px; height:0.8em;
      background:var(--gold);
      vertical-align:middle;
      margin-left:3px;
      animation:blink 1s infinite;
    }
    @keyframes blink { 0%,100%{opacity:1}50%{opacity:0} }

    /* Decorative divider */
    .divider {
      display:flex; align-items:center; justify-content:center; gap:16px;
      width:100%; max-width:280px;
      margin:28px auto;
      animation:fadeUp 0.8s var(--tr) 0.5s both;
    }
    .divider-line { flex:1; height:1px; background:linear-gradient(to right,transparent,var(--border)); }
    .divider-line.r { background:linear-gradient(to left,transparent,var(--border)); }
    .divider-gem {
      width:8px; height:8px;
      border:1.5px solid var(--gold);
      transform:rotate(45deg);
      background:rgba(212,165,116,0.15);
    }

    /* ── Cycling Phrase ── */
    .cycling-wrap {
      text-align:center;
      margin-bottom:88px;
      animation:fadeUp 0.8s var(--tr) 0.55s both;
    }
    .cycling-prefix {
      font-family:'Cormorant Garamond',serif;
      font-style:italic;
      font-size:clamp(1.1rem,2.8vw,1.55rem);
      color:var(--text-3);
      letter-spacing:0.04em;
      display:block;
      margin-bottom:14px;
    }
    .cycling-word-box {
      display:inline-block;
      position:relative;
      height:clamp(2.8rem,7vw,4.6rem);
      overflow:hidden;
      vertical-align:bottom;
    }
    .cycling-word {
      display:block;
      font-family:'Cormorant Garamond',serif;
      font-size:clamp(2.8rem,7vw,4.6rem);
      font-weight:700;
      line-height:1;
      background:linear-gradient(135deg,var(--gold-light) 0%,var(--gold) 35%,var(--rose) 70%,var(--lilac) 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      background-clip:text;
      filter:drop-shadow(0 0 30px rgba(212,165,116,0.3));
      opacity:0;
      transform:translateY(32px);
      transition:opacity 0.55s cubic-bezier(0.4,0,0.2,1), transform 0.55s cubic-bezier(0.4,0,0.2,1);
      position:absolute;
      left:50%; translate:-50% 0;
      white-space:nowrap;
    }
    .cycling-word.active {
      opacity:1; transform:translateY(0);
    }
    .cycling-word.exit {
      opacity:0; transform:translateY(-32px);
    }
    .cycling-suffix {
      font-family:'Cormorant Garamond',serif;
      font-style:italic;
      font-size:clamp(1.1rem,2.8vw,1.55rem);
      color:var(--text-3);
      letter-spacing:0.04em;
      display:block;
      margin-top:14px;
    }
    .cycling-dots {
      display:flex; gap:8px; justify-content:center; margin-top:20px;
    }
    .c-dot {
      width:6px; height:6px; border-radius:50%;
      background:var(--text-3);
      transition:background 0.4s, transform 0.4s;
    }
    .c-dot.active { background:var(--gold); transform:scale(1.5); }

    /* ── Cards Grid ── */
    .cards-grid {
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
      gap:28px; width:100%; margin-bottom:80px;
    }

    .wish-card {
      position:relative;
      padding:0;
      border-radius:24px;
      border:1px solid var(--border);
      background:var(--card-bg);
      backdrop-filter:blur(16px);
      cursor:none;
      display:flex; flex-direction:column; align-items:center; text-align:center;
      overflow:hidden;
      outline:none;
      will-change:transform;
      animation:fadeUp 0.9s var(--tr) calc(0.6s + var(--i,0) * 0.12s) both;
      transition:border-color 0.4s, box-shadow 0.4s, transform 0.4s var(--tr);
      height:380px;
    }
    @media (hover: none), (pointer: coarse) { .wish-card { cursor:pointer; height:auto; min-height:380px; } }
    .wish-card:nth-child(1){--i:0}
    .wish-card:nth-child(2){--i:1}
    .wish-card:nth-child(3){--i:2}
    .wish-card:hover {
      border-color:var(--border-h);
      box-shadow:0 0 50px rgba(212,165,116,0.15), 0 24px 48px rgba(0,0,0,0.5);
      transform:translateY(-8px);
    }

    /* ── Shared art canvas area ── */
    .card-art {
      width:100%; height:200px;
      position:relative; flex-shrink:0;
      display:flex; align-items:center; justify-content:center;
      overflow:hidden;
    }

    /* ── Card bottom info ── */
    .card-info {
      padding:20px 28px 28px;
      display:flex; flex-direction:column; align-items:center; gap:6px;
      flex:1;
    }
    .card-tag {
      font-size:0.68rem; font-weight:600; letter-spacing:0.18em;
      text-transform:uppercase; color:var(--gold); opacity:0.8;
    }
    .card-title {
      font-family:'Cormorant Garamond',serif;
      font-size:1.55rem; font-weight:700;
      color:var(--text-1); line-height:1.2;
    }
    .card-desc {
      font-size:0.85rem; color:var(--text-2); line-height:1.6; font-weight:300;
      margin-bottom:4px;
    }
    .card-btn {
      display:inline-flex; align-items:center; gap:8px;
      padding:9px 22px; margin-top:4px;
      border:1px solid var(--border-h); border-radius:100px;
      font-family:'Outfit',sans-serif;
      font-size:0.8rem; font-weight:600; letter-spacing:0.06em;
      color:var(--gold); background:rgba(212,165,116,0.08);
      cursor:none; transition:all 0.3s;
    }
    @media (hover:none),(pointer:coarse){ .card-btn{ cursor:pointer; } }
    .wish-card:hover .card-btn {
      background:rgba(212,165,116,0.18);
      box-shadow:0 0 20px rgba(212,165,116,0.2);
    }

    /* ════════════════════════════════
       CARD 1 — GIFT BOX
    ════════════════════════════════ */
    .gift-scene {
      position:relative; width:140px; height:160px;
    }
    /* box body */
    .gift-box-body {
      position:absolute; bottom:0; left:50%; transform:translateX(-50%);
      width:100px; height:80px;
      background:linear-gradient(135deg,#d4a574,#b07840);
      border-radius:6px 6px 8px 8px;
      box-shadow:0 8px 30px rgba(212,165,116,0.3), inset 0 1px 0 rgba(255,255,255,0.2);
    }
    /* vertical ribbon on body */
    .gift-box-body::before {
      content:''; position:absolute;
      left:50%; top:0; transform:translateX(-50%);
      width:16px; height:100%;
      background:linear-gradient(135deg,var(--rose),#c04060);
      border-radius:2px;
    }
    /* box lid */
    .gift-lid {
      position:absolute; bottom:76px; left:50%; transform:translateX(-50%);
      width:108px; height:24px;
      background:linear-gradient(135deg,#e0b580,#c08040);
      border-radius:6px 6px 0 0;
      box-shadow:0 -4px 20px rgba(212,165,116,0.2);
      transition:transform 0.5s var(--tr), opacity 0.4s;
      transform-origin:50% 100%;
    }
    /* ribbon on lid */
    .gift-lid::before {
      content:''; position:absolute;
      left:50%; top:0; transform:translateX(-50%);
      width:16px; height:100%;
      background:linear-gradient(135deg,var(--rose),#c04060);
      border-radius:2px 2px 0 0;
    }
    /* bow */
    .gift-bow {
      position:absolute; bottom:100px; left:50%; transform:translateX(-50%);
      width:60px; height:32px;
      transition:transform 0.5s var(--tr), opacity 0.4s;
    }
    .bow-left, .bow-right {
      position:absolute; bottom:0;
      width:24px; height:24px;
      border-radius:50% 50% 0 50%;
      background:linear-gradient(135deg,var(--rose),#e8a0b0);
      box-shadow:0 2px 8px rgba(232,114,140,0.4);
    }
    .bow-left  { left:2px;  transform:rotate(-45deg); }
    .bow-right { right:2px; transform:rotate(45deg) scaleX(-1); }
    .bow-knot {
      position:absolute; bottom:6px; left:50%; transform:translateX(-50%);
      width:12px; height:12px; border-radius:50%;
      background:var(--rose);
    }
    /* sparkles that appear on hover */
    .gift-sparkle {
      position:absolute;
      width:6px; height:6px;
      border-radius:50%;
      background:var(--gold-light);
      opacity:0;
      transition:none;
      pointer-events:none;
    }
    .wish-card:nth-child(1):hover .gift-lid {
      transform:translateX(-50%) rotateX(-70deg) translateY(-10px);
      opacity:0.3;
    }
    .wish-card:nth-child(1):hover .gift-bow {
      transform:translateX(-50%) translateY(-30px) scale(0.5);
      opacity:0;
    }
    .wish-card:nth-child(1):hover .gift-sparkle { animation:sparkleburst 0.8s var(--tr) forwards; }
    .gift-sparkle:nth-child(1){ top:30px; left:30px; animation-delay:0s !important; }
    .gift-sparkle:nth-child(2){ top:10px; left:60px; animation-delay:0.1s !important; }
    .gift-sparkle:nth-child(3){ top:20px; left:90px; animation-delay:0.05s !important; }
    .gift-sparkle:nth-child(4){ top:50px; left:20px; animation-delay:0.15s !important; }
    .gift-sparkle:nth-child(5){ top:40px; left:100px;animation-delay:0.08s !important; }
    @keyframes sparkleburst {
      0%   { opacity:0; transform:scale(0) translate(0,0); }
      50%  { opacity:1; transform:scale(1.5) translate(var(--sx,10px),var(--sy,-20px)); }
      100% { opacity:0; transform:scale(0.5) translate(var(--sx,10px),var(--sy,-40px)); }
    }
    .gift-sparkle:nth-child(1){ --sx:-20px; --sy:-30px; background:var(--gold-light); width:8px; height:8px; }
    .gift-sparkle:nth-child(2){ --sx:10px;  --sy:-40px; background:var(--rose); width:6px; height:6px; }
    .gift-sparkle:nth-child(3){ --sx:25px;  --sy:-20px; background:var(--lilac); width:10px; height:10px; }
    .gift-sparkle:nth-child(4){ --sx:-30px; --sy:-10px; background:var(--gold); width:5px; height:5px; }
    .gift-sparkle:nth-child(5){ --sx:15px;  --sy:-35px; background:#fff; width:7px; height:7px; }
    /* box idle shake */
    @keyframes giftShake {
      0%,100%{ transform:translateX(-50%) rotate(0deg); }
      20%    { transform:translateX(-50%) rotate(-3deg); }
      40%    { transform:translateX(-50%) rotate(3deg); }
      60%    { transform:translateX(-50%) rotate(-2deg); }
      80%    { transform:translateX(-50%) rotate(2deg); }
    }
    .gift-box-body { animation:giftShake 3s ease-in-out infinite; }

    /* ════════════════════════════════
       CARD 2 — BLOWING CANDLE
    ════════════════════════════════ */
    .candle-scene {
      position:relative; width:100%; height:100%;
      display:flex; align-items:flex-end; justify-content:center;
      padding-bottom:18px;
    }

    /* plate / base */
    .candle-plate {
      position:absolute; bottom:14px; left:50%; transform:translateX(-50%);
      width:90px; height:10px;
      background:linear-gradient(to bottom, #2a1f3a, #1a1228);
      border-radius:50%;
      box-shadow:0 4px 20px rgba(0,0,0,0.5);
    }
    .candle-plate::after {
      content:'';
      position:absolute; top:-3px; left:5px; right:5px; height:6px;
      background:linear-gradient(to bottom, #3a2a50, #2a1f3a);
      border-radius:50%;
    }

    /* wax drip trails on the candle body */
    .candle-body {
      position:relative;
      width:28px; height:90px;
      background:linear-gradient(160deg, #f5c8dc 0%, #e8a0c0 40%, #d4709a 100%);
      border-radius:4px 4px 3px 3px;
      box-shadow:
        inset -5px 0 10px rgba(0,0,0,0.15),
        inset 5px 0 8px rgba(255,255,255,0.2),
        0 4px 20px rgba(212,100,150,0.3);
      margin-bottom:16px;
      z-index:2;
    }
    /* highlight stripe */
    .candle-body::before {
      content:'';
      position:absolute; top:6px; left:6px;
      width:5px; height:70%;
      background:rgba(255,255,255,0.3);
      border-radius:3px;
    }
    /* wax drips */
    .candle-body::after {
      content:'';
      position:absolute; top:-4px; left:50%; transform:translateX(-50%);
      width:34px; height:12px;
      background:linear-gradient(to bottom, #fce8f0, #f5c8dc);
      border-radius:50% 50% 0 0 / 80% 80% 0 0;
      box-shadow:inset 0 -3px 6px rgba(0,0,0,0.1);
    }

    /* wax drip blobs */
    .wax-drip {
      position:absolute;
      background:linear-gradient(to bottom,#fce8f0, #f5c8dc);
      border-radius:0 0 50% 50%;
    }
    .wax-drip:nth-child(1){ width:6px; height:14px; top:8px;  left:2px;  border-radius:0 0 50% 50%; }
    .wax-drip:nth-child(2){ width:5px; height:10px; top:12px; right:4px; border-radius:0 0 50% 50%; }
    .wax-drip:nth-child(3){ width:4px; height:8px;  top:5px;  left:10px; border-radius:0 0 50% 50%; }

    /* wick */
    .candle-wick {
      position:absolute; top:-10px; left:50%; transform:translateX(-50%);
      width:2px; height:10px;
      background:linear-gradient(to top, #4a3020, #2a1810);
      border-radius:1px;
      z-index:3;
    }

    /* ── FLAME ── */
    .flame-outer {
      position:absolute;
      bottom:100%; left:50%; transform:translateX(-50%);
      width:20px; height:32px;
      z-index:4;
      transform-origin:50% 100%;
      transition:opacity 0.3s;
    }

    /* main flame layers */
    .flame-main {
      position:absolute; bottom:0; left:50%; transform:translateX(-50%);
      width:18px; height:30px;
      background:linear-gradient(to top, #ff3300 0%, #ff8800 40%, #ffcc00 75%, #fff7a0 100%);
      border-radius:50% 50% 20% 20% / 60% 60% 40% 40%;
      box-shadow:
        0 0 8px 4px rgba(255,120,0,0.6),
        0 0 20px 8px rgba(255,60,0,0.3),
        0 0 40px 12px rgba(255,160,0,0.15);
      animation: flameFlickerC 0.45s ease-in-out infinite alternate;
      transform-origin:50% 100%;
    }
    .flame-inner {
      position:absolute; bottom:3px; left:50%; transform:translateX(-50%);
      width:10px; height:18px;
      background:linear-gradient(to top, #ffaa00, #ffe680, #ffffff);
      border-radius:50% 50% 20% 20% / 60% 60% 40% 40%;
      opacity:0.9;
      animation: flameFlickerC 0.35s ease-in-out infinite alternate-reverse;
      transform-origin:50% 100%;
    }
    .flame-core {
      position:absolute; bottom:3px; left:50%; transform:translateX(-50%);
      width:5px; height:9px;
      background:#fff;
      border-radius:50%;
      opacity:0.7;
    }

    @keyframes flameFlickerC {
      0%   { transform:translateX(-50%) scaleX(1)    scaleY(1)    skewX(0deg);  }
      25%  { transform:translateX(-50%) scaleX(0.88) scaleY(1.06) skewX(-3deg); }
      50%  { transform:translateX(-50%) scaleX(1.08) scaleY(0.95) skewX(2deg);  }
      75%  { transform:translateX(-50%) scaleX(0.92) scaleY(1.08) skewX(-2deg); }
      100% { transform:translateX(-50%) scaleX(1.05) scaleY(0.97) skewX(3deg);  }
    }

    /* ── SMOKE (shows when blown out) ── */
    .smoke-wrap {
      position:absolute; bottom:105%; left:50%; transform:translateX(-50%);
      width:20px;
      pointer-events:none;
      opacity:0;
      transition:opacity 0.2s;
    }
    .smoke-puff {
      position:absolute; left:50%;
      width:8px; height:8px; border-radius:50%;
      background:rgba(200,200,220,0.6);
      filter:blur(3px);
      animation:smokeDrift 1.8s ease-out infinite;
      opacity:0;
    }
    .smoke-puff:nth-child(1){ animation-delay:0s;    --sx:-6px;  }
    .smoke-puff:nth-child(2){ animation-delay:0.35s; --sx:7px;   width:6px; height:6px; }
    .smoke-puff:nth-child(3){ animation-delay:0.7s;  --sx:-4px;  width:10px; height:10px; }
    .smoke-puff:nth-child(4){ animation-delay:1.05s; --sx:5px;   width:7px; height:7px; }

    @keyframes smokeDrift {
      0%   { opacity:0;   transform:translateX(-50%) translateY(0)    scale(0.5); }
      15%  { opacity:0.7; }
      80%  { opacity:0.3; transform:translateX(calc(-50% + var(--sx))) translateY(-55px) scale(2); }
      100% { opacity:0;   transform:translateX(calc(-50% + var(--sx))) translateY(-70px) scale(2.5); }
    }

    /* blown-out state — JS adds class .blown to .candle-scene */
    .candle-scene.blown .flame-outer { opacity:0; pointer-events:none; }
    .candle-scene.blown .smoke-wrap  { opacity:1; }
    .candle-scene.blown .candle-glow { opacity:0; }

    /* relight state — JS removes .blown */
    .candle-scene:not(.blown) .smoke-wrap { opacity:0; }

    /* ambient glow on card background */
    .candle-glow {
      position:absolute; bottom:20px; left:50%; transform:translateX(-50%);
      width:140px; height:60px;
      background:radial-gradient(ellipse, rgba(255,140,0,0.18), transparent 70%);
      border-radius:50%;
      animation:candleGlowPulse 2s ease-in-out infinite;
      transition:opacity 0.5s;
      pointer-events:none;
    }
    @keyframes candleGlowPulse {
      0%,100%{ transform:translateX(-50%) scale(1);   opacity:0.7; }
      50%    { transform:translateX(-50%) scale(1.15); opacity:1;   }
    }

    /* hint text */
    .candle-hint {
      position:absolute; top:12px; left:50%; transform:translateX(-50%);
      font-size:0.68rem; font-weight:600; letter-spacing:0.12em;
      text-transform:uppercase; color:var(--text-3);
      white-space:nowrap;
      transition:color 0.4s;
    }
    .candle-scene.blown .candle-hint { color:var(--gold); }

    /* ════════════════════════════════
       CARD 3 — BLOOMING FLOWER
    ════════════════════════════════ */
    .flower-scene {
      position:relative; width:160px; height:180px;
      display:flex; align-items:center; justify-content:center;
    }
    /* stem */
    .flower-stem {
      position:absolute; bottom:0; left:50%; transform:translateX(-50%);
      width:4px; height:70px;
      background:linear-gradient(to top,#4a7c40,#6aaa55);
      border-radius:2px;
      transform-origin:bottom center;
    }
    /* leaf */
    .flower-leaf {
      position:absolute; bottom:30px; left:calc(50% + 2px);
      width:24px; height:14px;
      background:linear-gradient(135deg,#5a9a48,#7acc60);
      border-radius:0 50% 50% 0;
      transform-origin:left center;
      transform:rotate(-20deg);
    }
    /* petals — 6 of them */
    .flower-center-wrap {
      position:absolute; top:20px; left:50%; transform:translateX(-50%);
      width:80px; height:80px;
    }
    .petal {
      position:absolute; top:50%; left:50%;
      width:22px; height:38px;
      border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
      transform-origin:50% 100%;
      background:linear-gradient(to top,var(--rose),#f0a0c0);
      box-shadow:0 0 10px rgba(232,114,140,0.3);
      transition:transform 0.6s var(--tr);
    }
    /* default closed state — all petals collapsed inward */
    .petal:nth-child(1){ transform:translate(-50%,-100%) rotate(0deg)   scaleY(0.3); }
    .petal:nth-child(2){ transform:translate(-50%,-100%) rotate(60deg)  scaleY(0.3); }
    .petal:nth-child(3){ transform:translate(-50%,-100%) rotate(120deg) scaleY(0.3); }
    .petal:nth-child(4){ transform:translate(-50%,-100%) rotate(180deg) scaleY(0.3); }
    .petal:nth-child(5){ transform:translate(-50%,-100%) rotate(240deg) scaleY(0.3); }
    .petal:nth-child(6){ transform:translate(-50%,-100%) rotate(300deg) scaleY(0.3); }
    /* bloomed state on hover */
    .wish-card:nth-child(3):hover .petal:nth-child(1){ transform:translate(-50%,-100%) rotate(0deg)   scaleY(1); }
    .wish-card:nth-child(3):hover .petal:nth-child(2){ transform:translate(-50%,-100%) rotate(60deg)  scaleY(1); }
    .wish-card:nth-child(3):hover .petal:nth-child(3){ transform:translate(-50%,-100%) rotate(120deg) scaleY(1); }
    .wish-card:nth-child(3):hover .petal:nth-child(4){ transform:translate(-50%,-100%) rotate(180deg) scaleY(1); }
    .wish-card:nth-child(3):hover .petal:nth-child(5){ transform:translate(-50%,-100%) rotate(240deg) scaleY(1); }
    .wish-card:nth-child(3):hover .petal:nth-child(6){ transform:translate(-50%,-100%) rotate(300deg) scaleY(1); }
    /* center of flower */
    .flower-core {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      width:22px; height:22px; border-radius:50%;
      background:radial-gradient(circle,var(--gold-light),var(--gold));
      box-shadow:0 0 16px rgba(212,165,116,0.7);
      z-index:2;
      transition:transform 0.5s var(--tr), box-shadow 0.5s;
    }
    .wish-card:nth-child(3):hover .flower-core {
      transform:translate(-50%,-50%) scale(1.3);
      box-shadow:0 0 30px rgba(212,165,116,0.9);
    }
    /* idle sway animation for flower */
    @keyframes flowerSway {
      0%,100%{ transform:translateX(-50%) rotate(0deg); }
      50%    { transform:translateX(-50%) rotate(4deg); }
    }
    .flower-stem { animation:flowerSway 3s ease-in-out infinite; }

    /* background glows per card */
    .wish-card:nth-child(1) .card-art { background:radial-gradient(ellipse at 50% 80%,rgba(212,165,116,0.12),transparent 70%); }
    .wish-card:nth-child(2) .card-art { background:radial-gradient(ellipse at 50% 100%, rgba(255,120,0,0.1), transparent 70%); }
    .wish-card:nth-child(3) .card-art { background:radial-gradient(ellipse at 50% 60%,rgba(232,114,140,0.1),transparent 70%); }

    /* ── Footer Quote ── */
    .footer-quote {
      text-align:center;
      padding:40px 20px;
      animation:fadeUp 0.8s var(--tr) 1s both;
    }
    .footer-quote blockquote {
      font-family:'Cormorant Garamond',serif;
      font-style:italic;
      font-size:clamp(1.1rem,2.5vw,1.5rem);
      color:var(--text-2); line-height:1.7;
      max-width:600px; margin:0 auto 12px;
    }
    .footer-quote cite { font-size:0.8rem; color:var(--text-3); letter-spacing:0.1em; }

    /* ── Music Toggle ── */
    .music-btn {
      position:fixed; bottom:28px; right:28px;
      width:52px; height:52px;
      border-radius:50%; border:1px solid var(--border-h);
      background:rgba(14,7,32,0.8);
      backdrop-filter:blur(12px);
      color:var(--gold); font-size:1.3rem;
      display:flex; align-items:center; justify-content:center;
      cursor:none; z-index:100;
      transition:all 0.3s var(--tr);
      box-shadow:0 0 20px rgba(212,165,116,0.1);
    }
    @media (hover: none), (pointer: coarse) {
      .music-btn { cursor: pointer; }
    }
    .music-btn:hover { box-shadow:0 0 30px rgba(212,165,116,0.3); transform:scale(1.1); }
    .music-btn .eq-bars {
      display:flex; gap:3px; align-items:flex-end; height:18px;
    }
    .eq-bar {
      width:3px; background:var(--gold); border-radius:2px;
      animation:eqBounce 0.6s ease-in-out infinite alternate;
    }
    .eq-bar:nth-child(2) { animation-delay:0.15s; }
    .eq-bar:nth-child(3) { animation-delay:0.3s; }
    .music-btn.paused .eq-bar { animation:none; height:4px !important; }
    @keyframes eqBounce {
      from { height:4px; }
      to   { height:18px; }
    }
    .eq-bar:nth-child(1) { --h:14px; }
    .eq-bar:nth-child(2) { --h:18px; }
    .eq-bar:nth-child(3) { --h:10px; }

    /* ── Modal ── */
    .modal-overlay {
      position:fixed; inset:0;
      background:rgba(4,1,14,0.6);
      backdrop-filter:blur(8px);
      display:flex; align-items:center; justify-content:center;
      opacity:0; pointer-events:none;
      transition:opacity 0.4s;
      z-index:200;
      padding:20px;
    }
    .modal-overlay.open { opacity:1; pointer-events:auto; }

    .modal-box {
      position:relative;
      width:100%; max-width:520px;
      background:linear-gradient(145deg,#100820,#0d0618);
      border:1px solid var(--border);
      border-radius:24px;
      padding:0 0 36px;
      box-shadow:0 0 80px rgba(212,165,116,0.1), 0 40px 80px rgba(0,0,0,0.6);
      transform:translateY(28px) scale(0.97);
      transition:transform 0.45s var(--tr), opacity 0.45s;
      opacity:0;
      max-height:90vh; overflow-y:auto;
      scrollbar-width:thin; scrollbar-color:var(--border) transparent;
    }
    .modal-overlay.open .modal-box { transform:translateY(0) scale(1); opacity:1; }

    .modal-img-wrap {
      position:relative; width:100%; height:230px;
      border-radius:24px 24px 0 0; overflow:hidden; margin-bottom:32px;
    }
    .modal-img-wrap img {
      width:100%; height:100%; object-fit:contain;
      transition:transform 6s ease;
    }
    .modal-overlay.open .modal-img-wrap img { transform:scale(1.06); }
    .modal-img-overlay {
      position:absolute; inset:0;
      background:linear-gradient(to bottom,transparent 50%,rgba(16,8,32,0.9));
    }
    .modal-img-badge {
      position:absolute; bottom:16px; left:20px;
      font-family:'Cormorant Garamond',serif;
      font-size:1.6rem; font-weight:700; color:#fff;
      text-shadow:0 2px 20px rgba(0,0,0,0.5);
    }

    .modal-body { padding:0 32px; }
    .modal-tag {
      font-size:0.7rem; font-weight:600; letter-spacing:0.18em;
      text-transform:uppercase; color:var(--gold); margin-bottom:10px;
    }
    .modal-title {
      font-family:'Cormorant Garamond',serif;
      font-size:2rem; font-weight:700;
      color:var(--text-1); margin-bottom:16px; line-height:1.2;
    }
    .modal-msg {
      font-size:1rem; line-height:1.85; color:var(--text-2); margin-bottom:28px;
    }
    .modal-actions { display:flex; gap:12px; }
    .btn-celebrate {
      flex:1; padding:13px 20px;
      background:linear-gradient(135deg,var(--gold),var(--rose));
      border:none; border-radius:12px;
      font-family:'Outfit',sans-serif; font-size:0.9rem; font-weight:600;
      color:#fff; cursor:none;
      transition:all 0.3s; letter-spacing:0.03em;
      box-shadow:0 4px 20px rgba(212,165,116,0.25);
    }
    @media (hover: none), (pointer: coarse) {
      .btn-celebrate, .btn-close-modal, .modal-x { cursor: pointer; }
    }
    .btn-celebrate:hover { transform:translateY(-2px); box-shadow:0 8px 30px rgba(212,165,116,0.4); }
    .btn-close-modal {
      padding:13px 20px;
      border:1px solid var(--border);
      border-radius:12px;
      background:transparent; color:var(--text-2);
      font-family:'Outfit',sans-serif; font-size:0.9rem; font-weight:500;
      cursor:none; transition:all 0.3s;
    }
    .btn-close-modal:hover { border-color:var(--border-h); color:var(--text-1); }

    .modal-x {
      position:absolute; top:14px; right:14px;
      width:36px; height:36px; border-radius:50%;
      background:rgba(255,255,255,0.07); border:none;
      color:var(--text-2); font-size:1.1rem;
      display:flex; align-items:center; justify-content:center;
      cursor:none; transition:all 0.2s; z-index:2;
    }
    .modal-x:hover { background:rgba(255,255,255,0.14); color:var(--text-1); }

    /* ── Celebration Burst ── */
    .burst-container {
      position:fixed; inset:0; pointer-events:none; z-index:300;
    }
    .burst-ring {
      position:absolute; border-radius:50%;
      border:2px solid var(--gold);
      animation:ringExpand 1s ease-out forwards;
      top:50%; left:50%;
      transform:translate(-50%,-50%) scale(0);
    }
    @keyframes ringExpand {
      to { transform:translate(-50%,-50%) scale(8); opacity:0; }
    }

    /* ── Burst Backdrop (NEW) ── */
    .burst-backdrop {
      position:fixed; inset:0;
      background: rgba(4, 1, 18, 0.55);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      z-index:300;
      pointer-events:none;
      animation: backdropFade 2.2s ease forwards;
    }
    @keyframes backdropFade {
      0%   { opacity:0; }
      15%  { opacity:1; }
      70%  { opacity:1; }
      100% { opacity:0; }
    }

    .burst-text {
      position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
      font-family:'Cormorant Garamond',serif;
      font-size:clamp(2rem,6vw,4rem); font-weight:700;
      background:linear-gradient(135deg,var(--gold-light),var(--rose));
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      background-clip:text;
      text-align:center; line-height:1.2;
      animation:burstText 2s var(--tr) forwards;
      pointer-events:none; z-index:302;
      text-shadow:none;
      filter:drop-shadow(0 0 30px rgba(212,165,116,0.5));
    }
    @keyframes burstText {
      0%  { opacity:0; transform:translate(-50%,-50%) scale(0.6); }
      30% { opacity:1; transform:translate(-50%,-50%) scale(1.05); }
      70% { opacity:1; transform:translate(-50%,-50%) scale(1); }
      100%{ opacity:0; transform:translate(-50%,-60%) scale(0.95); }
    }
    .confetti-piece {
      position:fixed; pointer-events:none; z-index:302;
      border-radius:2px;
      animation:confettiFall linear forwards;
    }
    @keyframes confettiFall {
      0%   { transform:translateY(-10px) rotate(0deg); opacity:1; }
      100% { transform:translateY(110vh) rotate(720deg); opacity:0; }
    }

    /* ── Keyframes ── */
    @keyframes fadeDown {
      from { opacity:0; transform:translateY(-18px); }
      to   { opacity:1; transform:translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(22px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── Responsive ── */
    @media(max-width:768px){
      .page { padding:60px 16px 80px; }
      .cards-grid { grid-template-columns:1fr; }
      .music-btn { bottom:20px; right:20px; }
    }
    @media(max-width:480px){
      .header { margin-bottom:56px; }
      .modal-img-wrap { height:180px; }
      .modal-body { padding:0 20px; }
      .modal-box { padding-bottom:24px; }
    }

    @media(prefers-reduced-motion:reduce){
      *, *::before, *::after {
        animation-duration:0.01ms !important;
        transition-duration:0.01ms !important;
      }
    }

    audio { display:none; }
  </style>
</head>
<body>

<div id="cursor-dot"></div>
<div id="cursor-ring"></div>

<canvas id="stars-canvas" aria-hidden="true"></canvas>
<canvas id="particles-canvas" aria-hidden="true"></canvas>

<audio id="bgMusic" src="bgmusic.mp3" loop preload="none"></audio>
<audio id="openSound" src="fahhh.mp3" preload="auto"></audio>

<main class="page" role="main">

  <div class="date-badge">
    <span>🎂</span> Birthday Celebration <span>✨</span>
  </div>

  <header class="header">
    <h1>
      <span class="h1-line1">Happy Birthday,</span>
      <span class="h1-name" id="typed-name"></span><span class="tw-cursor" id="tw-cursor"></span>
    </h1>

    <div class="divider">
      <div class="divider-line"></div>
      <div class="divider-gem"></div>
      <div class="divider-gem" style="width:5px;height:5px;opacity:0.5;transform:rotate(45deg) scale(0.7);"></div>
      <div class="divider-gem"></div>
      <div class="divider-line r"></div>
    </div>
  </header>

  <div class="cycling-wrap" aria-label="Birthday phrase">
    <span class="cycling-prefix">another year of being</span>
    <div class="cycling-word-box" id="wordBox">
      </div>

    <div class="cycling-dots" id="cyclingDots"></div>

  <section class="cards-grid" aria-label="Birthday wishes">

    <!-- CARD 1: Gift Box -->
    <button class="wish-card" data-wish="0" aria-label="Open surprise message">
      <div class="card-art">
        <div class="gift-scene">
          <div class="gift-sparkle"></div>
          <div class="gift-sparkle"></div>
          <div class="gift-sparkle"></div>
          <div class="gift-sparkle"></div>
          <div class="gift-sparkle"></div>
          <div class="gift-bow">
            <div class="bow-left"></div>
            <div class="bow-right"></div>
            <div class="bow-knot"></div>
          </div>
          <div class="gift-lid"></div>
          <div class="gift-box-body"></div>
        </div>
      </div>
      <div class="card-info">
        <p class="card-tag">Just for you</p>
        <h2 class="card-title">A Small Surprise</h2>
        <p class="card-desc">Sealed with love and a little chaos — just the way you like it.</p>
        <span class="card-btn">Open it <span>→</span></span>
      </div>
    </button>

    <!-- CARD 2: Blowing Candle -->
    <button class="wish-card" data-wish="1" aria-label="Open cheers card">
      <div class="card-art">
        <div class="candle-scene" id="candleScene">
          <div class="candle-glow"></div>
          <span class="candle-hint" id="candleHint">hover &amp; click to blow</span>

          <div class="candle-body">
            <div class="wax-drip"></div>
            <div class="wax-drip"></div>
            <div class="wax-drip"></div>
            <div class="candle-wick"></div>
            <div class="flame-outer" id="candleFlame">
              <div class="flame-main"></div>
              <div class="flame-inner"></div>
              <div class="flame-core"></div>
            </div>
            <div class="smoke-wrap">
              <div class="smoke-puff"></div>
              <div class="smoke-puff"></div>
              <div class="smoke-puff"></div>
              <div class="smoke-puff"></div>
            </div>
          </div>

          <div class="candle-plate"></div>
        </div>
      </div>
      <div class="card-info">
        <p class="card-tag">Celebration time</p>
        <h2 class="card-title">Cheers to You!</h2>
        <p class="card-desc">Every adventure, every laugh, every wild moment — here's to you.</p>
        <span class="card-btn">Open it <span>→</span></span>
      </div>

    <!-- CARD 3: Blooming Flower -->
    <button class="wish-card" data-wish="2" aria-label="Open sweet wishes card">
      <div class="card-art">
        <div class="flower-scene">
          <div class="flower-stem"></div>
          <div class="flower-leaf"></div>
          <div class="flower-center-wrap">
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="petal"></div>
            <div class="flower-core"></div>
          </div>
        </div>
      </div>
      <div class="card-info">
        <p class="card-tag">☠☠☠</p>
        <h2 class="card-title">Sweet Wishes</h2>
        <p class="card-desc">Open it on you own risk 💀.</p>
        <span class="card-btn">Open it <span>→</span></span>
      </div>
    </button>

  </section>

  <footer class="footer-quote">
    <blockquote>
    </blockquote>
    <cite></cite>
  </footer>

</main>

<button class="music-btn paused" id="musicBtn" aria-label="Toggle music" title="Toggle music">
  <div class="eq-bars">
    <div class="eq-bar" style="height:4px"></div>
    <div class="eq-bar" style="height:4px"></div>

        <button class="btn-close-modal" id="closeBtn">Maybe Later</button>
      </div>

<script>
'use strict';

/* ─── Config ─── */
const WISHES = [
  {
    tag:'Just for you',
    title:'🎁 A Small Surprise',
    imgTitle:'Surprise!',
    msg:'Another year older, Still undefeated. Still unpredictable. Hopefully the same energy continues and Backchodi level Never changes. Here\'s to you being exactly as chaotically wonderful as always. 🥂😎',
    image:'modalimg.jpg'
  },
  {
    tag:'Celebration time',
    title:'🥂 Cheers to You!',
    imgTitle:'Cheers!',
    msg:'Another year older, another year wiser, and another year more amazing. Every single chapter of your life has been bold, bright, and completely your own. Keep shining exactly the way you always do.',
    image:'modalimg2.jpg'
  },
  {
    tag:'',
    title:'🌸 Sweet Wishes',
    imgTitle:'✨',
    msg:'Bruh Bhoomi made me to add this sticker 💀. BTW Happy Birthday Brooo ✨✨✨',
    image:'modalimg3.jpg'
  }
];

/* ─── Detect touch/mobile ─── */
const isTouchDevice = () =>
  window.matchMedia('(hover: none), (pointer: coarse)').matches ||
  ('ontouchstart' in window) ||
  navigator.maxTouchPoints > 0;

/* ─── Cursor (desktop only) ─── */
const dot  = document.getElementById('cursor-dot');
const ring = document.getElementById('cursor-ring');

if (!isTouchDevice()) {
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',e=>{
    mx=e.clientX; my=e.clientY;
    dot.style.left = mx+'px'; dot.style.top = my+'px';
  });
  (function animRing(){
    rx += (mx-rx)*0.12; ry += (my-ry)*0.12;
    ring.style.left=rx+'px'; ring.style.top=ry+'px';
    requestAnimationFrame(animRing);
  })();

  /* Apply cursor:none to interactive elements on desktop only */
  document.querySelectorAll('button,a,[role="button"]').forEach(el=>{
    el.style.cursor='none';
  });
} else {
  /* On touch devices, hide cursor elements and restore normal cursor */
  dot.style.display  = 'none';
  ring.style.display = 'none';
  document.body.style.cursor = 'auto';
}

/* ─── Typewriter ─── */
const NAME='Ananya';
const typedEl=document.getElementById('typed-name');
const curEl=document.getElementById('tw-cursor');
let ti=0;
function typeChar(){
  if(ti<=NAME.length){
    typedEl.textContent=NAME.slice(0,ti++);
    setTimeout(typeChar, ti===1?600:90);
  } else {
    setTimeout(()=>{ curEl.style.display='none'; },1600);
  }
}
setTimeout(typeChar,900);

/* ─── Stars Canvas ─── */
(function(){
  const c=document.getElementById('stars-canvas');
  const ctx=c.getContext('2d');
  let W,H,stars=[],shooters=[];

  function resize(){ W=c.width=window.innerWidth; H=c.height=window.innerHeight; }
  resize(); window.addEventListener('resize',resize);

  function mkStar(){
    return { x:Math.random()*W, y:Math.random()*H,
             r:Math.random()*1.2+0.2,
             a:Math.random(), da:Math.random()*0.004+0.001 };
  }
  for(let i=0;i<200;i++) stars.push(mkStar());

  function mkShooter(){
    const x=Math.random()*W*0.7;
    const y=Math.random()*H*0.4;
    return { x,y,vx:6+Math.random()*4, vy:2+Math.random()*3,
             len:80+Math.random()*60, life:1, dead:false };
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    stars.forEach(s=>{
      s.a+=s.da; if(s.a>1||s.a<0) s.da*=-1;
      ctx.beginPath();
      ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(245,239,232,${s.a*0.7})`;
      ctx.fill();
    });
    shooters = shooters.filter(s=>{
      s.x+=s.vx; s.y+=s.vy; s.life-=0.025;
      if(s.life<=0) return false;
      const grd=ctx.createLinearGradient(s.x-s.vx*10,s.y-s.vy*10,s.x,s.y);
      grd.addColorStop(0,'rgba(240,201,138,0)');
      grd.addColorStop(1,`rgba(240,201,138,${s.life*0.9})`);
      ctx.beginPath();
      ctx.moveTo(s.x-s.vx*10,s.y-s.vy*10);
      ctx.lineTo(s.x,s.y);
      ctx.strokeStyle=grd; ctx.lineWidth=2; ctx.stroke();
      return true;
    });
    requestAnimationFrame(draw);
  }
  draw();
  setInterval(()=>{ if(Math.random()<0.6) shooters.push(mkShooter()); }, 2800);
})();

/* ─── Particle Canvas ─── */
const pcSystem=(function(){
  const c=document.getElementById('particles-canvas');
  const ctx=c.getContext('2d');
  let W,H,pts=[];
  function resize(){ W=c.width=window.innerWidth; H=c.height=window.innerHeight; }
  resize(); window.addEventListener('resize',resize);

  function mkPt(x,y){
    const a=Math.random()*Math.PI*2, sp=Math.random()*9+2;
    return { x,y, vx:Math.cos(a)*sp, vy:Math.sin(a)*sp,
             life:1, r:Math.random()*3+1.2,
             hue:Math.random()*60+10 };
  }
  function explode(x,y,n=55){
    for(let i=0;i<n;i++) pts.push(mkPt(x,y));
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    pts=pts.filter(p=>{
      p.vy+=0.07; p.vx*=0.98;
      p.x+=p.vx; p.y+=p.vy;
      p.life-=0.012;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`hsla(${p.hue},80%,65%,${p.life})`;
      ctx.fill();
      return p.life>0;
    });
    requestAnimationFrame(draw);
  }
  draw();
  setInterval(()=>{ explode(Math.random()*W, Math.random()*H*0.75, 30); }, 1800);
  return { explode };
})();

/* ─── Cycling Word ─── */
(function(){
  const words = ['legendary','iconic','chaotic','unstoppable','irreplaceable','unpredictable'];
  const box = document.getElementById('wordBox');
  const dotsWrap = document.getElementById('cyclingDots');
  let cur = 0;

  const els = words.map((w,i)=>{
    const el = document.createElement('span');
    el.className = 'cycling-word';
    el.textContent = w;
    box.appendChild(el);
    return el;
  });

  const dots = words.map((_,i)=>{
    const d = document.createElement('div');
    d.className = 'c-dot' + (i===0?' active':'');
    dotsWrap.appendChild(d);
    return d;
  });

  function sizeBox(){
    let maxW = 0;
    els.forEach(el=>{
      el.style.position='static'; el.style.opacity='1'; el.style.transform='none';
      maxW = Math.max(maxW, el.offsetWidth);
      el.style.position=''; el.style.opacity=''; el.style.transform='';
    });
    box.style.width = (maxW+8)+'px';
  }

  els[0].classList.add('active');
  document.fonts.ready.then(sizeBox);
  setTimeout(sizeBox, 400);

  function next(){
    const prev = cur;
    cur = (cur+1) % words.length;
    els[prev].classList.remove('active');
    els[prev].classList.add('exit');
    dots[prev].classList.remove('active');
    setTimeout(()=>{ els[prev].classList.remove('exit'); }, 560);
    els[cur].classList.add('active');
    dots[cur].classList.add('active');
  }

  setInterval(next, 2200);
})();

/* ─── 3D Card Tilt (desktop only) ─── */
if (!isTouchDevice()) {
  document.querySelectorAll('.wish-card').forEach(card=>{
    card.addEventListener('mousemove',e=>{
      const r=card.getBoundingClientRect();
      const cx=(e.clientX-r.left)/r.width-0.5;
      const cy=(e.clientY-r.top)/r.height-0.5;
      card.style.transform=`perspective(900px) rotateY(${cx*10}deg) rotateX(${-cy*8}deg) translateY(-8px)`;
    });
    card.addEventListener('mouseleave',()=>{
      card.style.transform='';
    });
  });
}

const openSound = document.getElementById('openSound');
document.querySelectorAll('.wish-card').forEach(card=>{
  card.addEventListener('click',()=>{
    // Play the new sound effect
    openSound.currentTime = 0;
    openSound.play().catch(e => console.log("Sound could not be played:", e));

    const wi=parseInt(card.dataset.wish);
    openModal(wi);
  });
});

/* ─── Audio ─── */
const audio=document.getElementById('bgMusic');
const musicBtn=document.getElementById('musicBtn');
let playing=false, started=false;
function tryPlay(){
  audio.volume=0.28;
  audio.play().then(()=>{ playing=true; musicBtn.classList.remove('paused'); })
             .catch(()=>{});
}
document.addEventListener('click',()=>{ if(!started){ started=true; tryPlay(); } },{ once:true });
musicBtn.addEventListener('click',e=>{
  e.stopPropagation();
  if(playing){ audio.pause(); playing=false; musicBtn.classList.add('paused'); }
  else       { tryPlay(); }
});

/* ─── Modal ─── */
const overlay  = document.getElementById('modalOverlay');
const modalImg = document.getElementById('modalImg');
const modalImgTitle = document.getElementById('modalImgTitle');
const modalTag = document.getElementById('modalTag');
const modalTitle=document.getElementById('modalTitle');
const modalMsg = document.getElementById('modalMsg');

function openModal(i){
  const w=WISHES[i];
  modalImg.src=w.image;
  modalImgTitle.textContent=w.imgTitle;
  modalTag.textContent=w.tag;
  modalTitle.textContent=w.title;
  modalMsg.textContent=w.msg;
  overlay.classList.add('open');
  overlay.setAttribute('aria-hidden','false');
  document.body.style.overflow='hidden';
  setTimeout(()=>{
    pcSystem.explode(window.innerWidth/2+60, window.innerHeight/3);
    pcSystem.explode(window.innerWidth/2-60, window.innerHeight/3);
  },200);
}
function closeModal(){
  overlay.classList.remove('open');
  overlay.setAttribute('aria-hidden','true');
  document.body.style.overflow='';
}
document.getElementById('modalClose').addEventListener('click',closeModal);
document.getElementById('closeBtn').addEventListener('click',closeModal);
overlay.addEventListener('click',e=>{ if(e.target===overlay) closeModal(); });
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeModal(); });

/* ─── Candle blow & relight ─── */
(function(){
  const scene = document.getElementById('candleScene');
  const hint  = document.getElementById('candleHint');
  if(!scene) return;

  let blown = false;
  let relightTimer = null;

  scene.addEventListener('click', function(e){
    e.stopPropagation(); // don't open modal
    if(!blown){
      // blow out
      blown = true;
      scene.classList.add('blown');
      hint.textContent = 'relighting…';
      // auto relight after 2.2s
      relightTimer = setTimeout(()=>{
        blown = false;
        scene.classList.remove('blown');
        hint.textContent = 'hover & click to blow';
      }, 2200);
    }
  });
})();

document.getElementById('celebrateBtn').addEventListener('click',()=>{
  closeModal();
  setTimeout(triggerCelebration,300);
});

function triggerCelebration(){
  const colors=['#d4a574','#f0c98a','#e8728c','#b57bee','#fff','#7be8d4'];

  /* ── Blur backdrop (NEW) ── */
  const backdrop = document.createElement('div');
  backdrop.className = 'burst-backdrop';
  document.body.appendChild(backdrop);
  setTimeout(()=>backdrop.remove(), 2300);

  for(let i=0;i<120;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`
      left:${Math.random()*100}vw;
      top:-10px;
      width:${6+Math.random()*8}px;
      height:${6+Math.random()*8}px;
      background:${colors[Math.floor(Math.random()*colors.length)]};
      transform:rotate(${Math.random()*360}deg);
      animation:confettiFall ${1.8+Math.random()*2.2}s ${Math.random()*0.8}s linear forwards;
    `;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),4000);
  }
  const burst=document.createElement('div');
  burst.className='burst-container';
  for(let i=0;i<3;i++){
    const ring=document.createElement('div');
    ring.className='burst-ring';
    ring.style.cssText=`width:${80+i*40}px;height:${80+i*40}px;animation-delay:${i*150}ms;border-color:${['var(--gold)','var(--rose)','var(--lilac)'][i]};`;
    burst.appendChild(ring);
  }
  document.body.appendChild(burst);
  setTimeout(()=>burst.remove(),1500);

  const txt=document.createElement('div');
  txt.className='burst-text';
  txt.innerHTML='Happy<br>Birthday!<br><span style="font-size:0.55em;font-style:italic;">Ananya 🎉</span>';
  document.body.appendChild(txt);
  setTimeout(()=>txt.remove(),2200);

  const cx=window.innerWidth/2, cy=window.innerHeight/2;
  for(let i=0;i<10;i++){
    const a=(i/10)*Math.PI*2;
    setTimeout(()=>pcSystem.explode(cx+Math.cos(a)*180,cy+Math.sin(a)*180,40),i*80);
  }
  setTimeout(()=>{ pcSystem.explode(cx,cy,80); },400);
}
</script>
